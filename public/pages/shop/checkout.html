<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Checkout | Funkoshop</title>
</head>

<body>
    <header>
        <nav class="navbar container">
            <picture class="navbar__logo">
                <a href="../../index.html">
                    <img src="../../img/branding/logo_light_horizontal.svg" alt="Funkoshop">
                </a>
            </picture>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a class="navbar__link" href="./shop.html">SHOP</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link" href="../admin/login.html">LOGIN</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__cart" href="./carrito.html">
                        <img src="../../img/icons/cart-icon.svg" alt="carrito">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="carrito__hero container">
            <p class="carrito__title">FINALIZAR COMPRA</p>
        </div>

        <section class="checkout container" style="padding: 2rem 0; max-width: 800px; margin: 0 auto;">
            <h2 style="margin-bottom: 2rem;">Resumen de tu pedido</h2>

            <div id="productos-checkout" style="margin-bottom: 2rem;"></div>

            <div id="resumen-checkout" style="margin: 2rem 0; padding: 1rem; background: #f5f5f5;"></div>

            <div style="margin: 2rem 0; text-align: center;">
                <button id="checkout-btn"
                    style="background: #009ee3; color: white; padding: 1rem 3rem; font-size: 1.2rem; border: none; border-radius: 5px; cursor: pointer;">
                    Pagar con MercadoPago
                </button>
                <p id="loading" style="display: none; margin-top: 1rem;">Redirigiendo a MercadoPago...</p>
            </div>

            <a href="./carrito.html" style="display: inline-block; margin-top: 1rem; color: #009ee3;">← Volver al
                carrito</a>
        </section>
    </main>

    <footer>
        <nav class="navbar__main container">
            <ul class="navbar__footer">
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="./shop.html">SHOP</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="../admin/login.html">INGRESAR</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="../admin/contacto.html">CONTACTO</a>
                </li>
            </ul>
            <picture>
                <img src="../../img/branding/isotype.svg" alt="Funkoshop">
            </picture>
        </nav>
        <p class="rights container">All rights reserved 2022 - Funkoshop &copy;</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
    <script>
        const carrito = JSON.parse(localStorage.getItem('carrito') || '[]');
        const productosDiv = document.getElementById('productos-checkout');
        const resumenDiv = document.getElementById('resumen-checkout');

        if (carrito.length === 0) {
            productosDiv.innerHTML = '<p>No hay productos en el carrito.</p>';
        } else {
            let total = 0;
            let totalCantidad = 0;

            carrito.forEach(item => {
                const precio = parseFloat(String(item.precio).replace(/[^0-9.]/g, ''));
                const subtotal = precio * item.cantidad;
                total += subtotal;
                totalCantidad += item.cantidad;

                productosDiv.innerHTML += `
                    <div style="display: flex; gap: 1rem; margin-bottom: 1rem; padding: 1rem; border: 1px solid #ddd;">
                        <img src="${item.imagen}" alt="${item.nombre}" style="width: 80px; height: 80px; object-fit: cover;">
                        <div style="flex: 1;">
                            <h4>${item.nombre}</h4>
                            <p>Cantidad: ${item.cantidad}</p>
                            <p><strong>${item.precio}</strong></p>
                        </div>
                        <div>
                            <strong>$ ${subtotal.toFixed(2)}</strong>
                        </div>
                    </div>
                `;
            });

            resumenDiv.innerHTML = `
                <p style="display: flex; justify-content: space-between;"><span>Cantidad de items:</span> <strong>${totalCantidad}</strong></p>
                <p style="display: flex; justify-content: space-between;"><span>Subtotal:</span> <strong>$ ${total.toFixed(2)}</strong></p>
                <p style="display: flex; justify-content: space-between;"><span>Envío:</span> <strong>$ 0.00</strong></p>
                <hr>
                <h3 style="display: flex; justify-content: space-between;">
                    <span>TOTAL:</span> <strong>$ ${total.toFixed(2)}</strong>
                </h3>
            `;
        }

        document.getElementById('checkout-btn').addEventListener('click', () => {
            alert('Integración con MercadoPago pendiente. Total: ' + document.querySelector('#resumen-checkout h3 strong:last-child')?.textContent);
        });
    </script>
</body>

</html>
