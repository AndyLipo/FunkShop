<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Carrito | Funkoshop</title>
</head>

<body>
    <header>
        <nav class="navbar container">
            <picture class="navbar__logo">
                <img src="../../img/branding/logo_light_horizontal.svg" alt="Isotipo de la marca Funkoshop">
            </picture>
            <ul class="navbar__menu">
                <li class="navbar__item with-submenu">
                    <a class="navbar__link with-icon">SHOP <iconify-icon icon="tabler:chevron-down"></iconify-icon></a>
                    <ul class="submenu">
                        <li class="submenu__item">
                            <a href="../shop/shop.html" class="submenu__link">Funkos</a>
                        </li>
                        <li class="submenu__item">
                            <a href="" class="submenu__link">Remeras</a>
                        </li>
                        <li class="submenu__item">
                            <a href="" class="submenu__link">Llaveros</a>
                        </li>
                    </ul>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link" href="../admin/contacto.html">CONTACTO</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link" href="../admin/login.html">LOGIN</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__cart" href="./carrito.html">
                        <picture>
                            <img src="../../img/icons/cart-icon.svg" alt="Icono del carrito de compras">
                        </picture>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="carrito__hero container">
            <p class="carrito__title">CARRITO DE COMPRAS</p>
        </div>
        <!-- Encabezado de la tabla del carrito-->
        <section class="carrito container">
            <table class="carrito__grid">
                <tr class="carrito__titulos">
                    <td>
                        <h3 class="carrito__columna">DETALLE DEL PRODUCTO</h3>
                    </td>
                    <td>
                        <h3 class="carrito__columna">CANTIDAD</h3>
                    </td>
                    <td>
                        <h3 class="carrito__columna">TOTAL</h3>
                    </td>
                    <td></td>
                </tr>
            </table>
        </section>
        </section>
        <section class="resumen container">
            <h1 class="resumen__titulo">RESUMEN</h1>
            <table class="resumen__contenido">
                <tr>
                    <td>
                        <p class="resumen_cantidad">CANTIDAD DE ELEMENTOS</p>
                    </td>
                    <td>
                        <p class="resumen_cant_nro">3</p>
                    </td>
                </tr>
                <tr>
                    <td>
                        <p class="resumen_subtotal">SUBTOTAL</p>
                    </td>
                    <td>
                        <p class="resumen_subtotal_nro">$ 5.399,97</p>
                    </td>
                </tr>
                <tr>
                    <td>
                        <p class="resumen__envio">ENVIO</p>
                    </td>
                    <td>
                        <p class="resumen__envio_nro">$ 0,00</p>
                    </td>
                </tr>
                <tr>
                    <td>
                        <p class="resumen_total">TOTAL</p>
                    </td>
                    <td>
                        <p class="resumen_total_nro">$ 5.399,97</p>
                </tr>
            </table>
            <a href="/shop/checkout">
                <button class="boton_ir_a_pagar">IR A PAGAR</button>
            </a>
        </section>
    </main>

    <footer>
        <nav class="navbar__main container">
            <ul class="navbar__footer">
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="../shop/shop.html">SHOP</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="../admin/login.html">INGRESAR</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="../admin/contacto.html">CONTACTO</a>
                </li>
            </ul>
            <picture class="navbar_logo">
                <img src="../../img/branding/isotype.svg" alt="Isotipo de la marca Funkoshop">
            </picture>
        </nav>
        <p class="rights container">All rights reserved 2022 - Funkoshop &copy;</p>
    </footer>
</body>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<script src="../../js/carrito.js"></script>

</html>
