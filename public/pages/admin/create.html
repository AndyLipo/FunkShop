    <title>Admin | Crear Nuevo Item</title>

<body>
    <header>
        <nav class="navbar container">
            <picture class="navbar__logo">
                <img src="../../img/branding/logo_light_horizontal.svg" alt="Isotipo de la marca Funkoshop">
            </picture>
            <ul class="navbar__menu">
                <li class="navbar__item with-submenu">
                    <a class="navbar__link with-icon" href="../shop/shop.html">VER TIENDA</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link" href="./admin.html">ADMIN</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link" href="./login.html">SALIR</a>
                </li>
            </ul>
        </nav>
    </header>

    <body>
        <section class="item container">
            <h1 class="item__titulo">CREAR NUEVO ITEM</h1>
            <form action="" id="productForm">
                <div class="item__linea">
                    <label for="categoria" class="item__label">Categoria:</label>
                    <select name="categoria" id="categoria">
                        <option value="">Seleccionar</option>
                        <option value="1">Figuras coleccionables</option>
                    </select>

                    <select name="licencia" id="licencia">
                        <option value="">Seleccionar</option>
                        <option value="1">Star Wars</option>
                        <option value="2">Pokemon</option>
                        <option value="3">Harry Potter</option>
                    </select>
                </div>
                <div class="item__linea">
                    <label for="producto" class="formulario__label">Nombre del Producto:</label>
                    <input class="item__input" name="producto" id="producto" type="text"
                        placeholder="Kakashi Hatake Shippuden Saga">
                </div>
                <div class="item__linea">
                    <textarea class="item__description" name="descripcion" id="descripcion"
                        placeholder="Descripción del Producto"></textarea>
                </div>
                <div class="item__linea">
                    <label for="sku" class="item__label">SKU:</label>
                    <input class="item__input" name="sku" id="sku" type="text" placeholder="SSK111AB001">
                    <label for="precio" class="item__label">Precio:</label>
                    <input class="item__input" name="precio" id="precio" type="text" placeholder="$ 0.000,00">
                    <label for="stock" class="item__label">Stock:</label>
                    <input class="item__input" name="stock" id="stock" type="text" placeholder="0">
                </div>
                <div class="item__linea">
                    <label for="descuento" class="item__label">Descuento:</label>
                    <input class="item__input" name="descuento" id="descuento" type="text" placeholder="0%">
                    <label for="cuotas" class="item__label">Cuotas:</label>
                    <select name="cuotas" id="cuotas" aria-placeholder="Seleccionar">
                        <option value="3">3 Cuotas sin interés</option>
                        <option value="6">6 Cuotas sin interés</option>
                        <option value="12">12 Cuotas sin interés</option>
                    </select>
                </div>
                <div class="item__linea">
                    <label class="item__label">Imagen Frontal:</label>
                    <button class="item__boton" type="button" id="btnImgFront">Elegir archivo</button>
                    <span id="labelImgFront">No se seleccionó archivo</span>
                    <input type="file" id="inputImgFront" accept="image/*" style="display:none">
                </div>
                <div class="item__linea">
                    <label class="item__label">Imagen Trasera:</label>
                    <button class="item__boton" type="button" id="btnImgBack">Elegir archivo</button>
                    <span id="labelImgBack">No se seleccionó archivo</span>
                    <input type="file" id="inputImgBack" accept="image/*" style="display:none">
                </div>
                <div class="item__botones">
                    <button class="item__boton" type="submit">Agregar Producto</button>
                    <button class="item__boton" type="reset">Limpiar</button>
                </div>
            </form>
        </section>
    </body>

    <footer>
        <nav class="navbar__main container">
            <ul class="navbar__footer">
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="/shop">SHOP</a>

                <li class="navbar__item">

                </li>
                <li class="navbar__item">

                </li>
            </ul>
            <picture class="navbar_logo">
                <img src="../../img/branding/isotype.svg" alt="Isotipo de la marca Funkoshop">
            </picture>
        </nav>
        <p class="rights container">All rights reserved 2022 - Funkoshop &copy;</p>
    </footer>
