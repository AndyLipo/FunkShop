<body>
    <header>
        <nav class="navbar container">
            <picture class="navbar__logo">
                <img src="../../img/branding/logo_light_horizontal.svg" alt="Isotipo de la marca Funkoshop">
            </picture>

                </li>

                </li>
                <li class="navbar__item">
                    <a class="navbar__link" href="./login.html">SALIR</a>
                </li>
            </ul>
        </nav>
    </header>

    <section class="item container">
        <h1 class="item__titulo">EDITAR ITEM</h1>
        <form id="productForm">
            <div class="item__linea">
                <label for="categoria" class="item__label">Categoría:</label>
                <select id="categoria">
                    <option value="">Seleccionar</option>
                    <option value="1">Figuras coleccionables</option>
                </select>
                <select name="licencia" id="licencia">
                    <option value="">Seleccionar</option>
                    <option value="1">Star Wars</option>
                    <option value="2">Pokemon</option>
                    <option value="3">Harry Potter</option>
                </select>
            </div>
            <div class="item__linea">
                <label for="producto" class="item__label">Nombre del Producto:</label>
                <input class="item__input" id="producto" type="text">
            </div>
            <div class="item__linea">
                <textarea class="item__description" id="descripcion" placeholder="Descripción del Producto"></textarea>
            </div>
            <div class="item__linea">
                <label for="sku" class="item__label">SKU:</label>
                <input class="item__input" id="sku" type="text">
                <label for="precio" class="item__label">Precio:</label>
                <input class="item__input" id="precio" type="text">
                <label for="stock" class="item__label">Stock:</label>
                <input class="item__input" id="stock" type="text">
            </div>
            <div class="item__linea">
                <label for="cuotas" class="item__label">Cuotas:</label>
                <select id="cuotas">
                    <option value="3">3 Cuotas sin interés</option>
                    <option value="6">6 Cuotas sin interés</option>
                    <option value="12">12 Cuotas sin interés</option>
                </select>
            </div>
            <div class="item__linea">
                <label class="item__label">Imagen Frontal:</label>
                <button type="button" id="btnImgFront" class="item__boton">Elegir archivo</button>
                <span id="labelImgFront">No se seleccionó archivo</span>
                <input type="file" id="inputImgFront" accept="image/*" style="display:none">
            </div>
            <div class="item__linea">
                <img id="previewFront" src="" alt="Imagen frontal actual" style="display:none; max-width:150px;">
            </div>
            <div class="item__linea">
                <label class="item__label">Imagen Trasera:</label>
                <button type="button" id="btnImgBack" class="item__boton">Elegir archivo</button>
                <span id="labelImgBack">No se seleccionó archivo</span>
                <input type="file" id="inputImgBack" accept="image/*" style="display:none">
            </div>
            <div class="item__linea">
                <img id="previewBack" src="" alt="Imagen trasera actual" style="display:none; max-width:150px;">
            </div>
            <div class="item__botones">
                <button class="item__boton" type="submit">Modificar Producto</button>
            </div>
        </form>
    </section>

    <footer>
        <nav class="navbar__main container">
            <ul class="navbar__footer">
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="../shop/shop.html">SHOP</a>
                </li>
                <li class="navbar__item">

                </li>

        </nav>
