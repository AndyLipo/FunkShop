<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Admin | Tienda Funkoshop</title>
</head>

<body>
    <header>
        <nav class="navbar container">
            <picture class="navbar__logo">
                <img src="../../img/branding/logo_light_horizontal.svg" alt="Isotipo de la marca Funkoshop">
            </picture>
            <ul class="navbar__menu">
                <li class="navbar__item with-submenu">
                    <a class="navbar__link" href="../shop/shop.html">VER TIENDA</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link" href="./admin.html">ADMIN</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link" href="#" onclick="logout()">SALIR</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="busqueda">
                <iconify-icon icon="ic:baseline-search" class="busqueda__icon"></iconify-icon>
                <p><input class="busqueda__input" type="search" name="busqueda"
                        placeholder="Código, nombre o categoria"></p>
            </div>
            <div class="listado">
                <p class="listado__title">LISTADO DE PRODUCTOS</p>
                <div class="agregar">
                    <p class="listado__agregar">AGREGAR</p>
                    <a class="navbar__cart" href="./create.html">
                        <iconify-icon class="listado_agregarIcon" icon="ph:plus-fill"></iconify-icon>
                    </a>
                </div>
            </div>
            <!-- Encabezado de la tabla de Productos-->
            <section class="listado__grid">
                <table class="listado__table">
                    <tr class="listado__titulos">
                        <td>
                            <h3 class="listado__columna">ID</h3>
                        </td>
                        <td>
                            <h3 class="listado__columna">Código</h3>
                        </td>
                        <td>
                            <h3 class="listado__columna">Nombre del Producto</h3>
                        </td>
                        <td>
                            <h3 class="listado__columna">Categoría</h3>
                        </td>
                        <td></td>
                        <td></td>
                    </tr>
                </table>
            </section>
        </div>
    </main>

    <footer>
        <nav class="navbar__main container">
            <ul class="navbar__footer">
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="/shop">SHOP</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="/register">REGISTRARSE</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="/login">INGRESAR</a>
                </li>
                <li class="navbar__item">
                    <a class="navbar__link_footer" href="/contact">CONTACTO</a>
                </li>
            </ul>
            <picture class="navbar_logo">
                <img src="../../img/branding/isotype.svg" alt="Isotipo de la marca Funkoshop">
            </picture>
        </nav>
        <p class="rights container">All rights reserved 2022 - Funkoshop &copy;</p>
    </footer>
</body>
